name: Fabric Bolt
options:
  bundleIdPrefix: com.shimondeitel.fabricbolt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fabric Bolt:
    type: application
    platform: iOS
    sources:
      - path: Fabric Bolt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fabricbolt
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fabric Bolt/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Fabric BoltTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Fabric BoltTests
      - path: Fabric Bolt.storekit
    dependencies:
      - target: Fabric Bolt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fabricbolt.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Fabric BoltUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Fabric BoltUITests
    dependencies:
      - target: Fabric Bolt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fabricbolt.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fabric Bolt:
    build:
      targets:
        Fabric Bolt: all
        Fabric BoltTests: [test]
        Fabric BoltUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fabric Bolt.storekit
    test:
      config: Debug
      storeKitConfiguration: Fabric Bolt.storekit
      targets:
        - Fabric BoltTests
        - Fabric BoltUITests
    archive:
      config: Release
